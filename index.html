<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">

        </header>

        <main id="main-content">
            <!-- Home View: List of Posts -->
            <div id="home-view">

                    </li>
                    <li>

                        </a>
                    </li>

            <!-- Post View -->

                    <!-- Markdown rendered here -->
                </article>
